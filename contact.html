<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 — 珠海三界智能科技有限公司</title>
<meta name="description" content="联系珠海三界智能科技有限公司，获取 PromptLogic 产品试用、商务合作咨询和技术支持。">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.contact-info-cards{display:grid;gap:1.2rem}
.contact-info-card{
  display:flex;gap:1.2rem;align-items:center;
  background:var(--bg2);border:1px solid rgba(155,27,48,.06);
  border-radius:var(--radius);padding:1.5rem;
  transition:var(--transition);
}
.contact-info-card:hover{border-color:rgba(155,27,48,.15);transform:translateX(5px)}
.contact-info-icon{
  width:50px;height:50px;border-radius:.6rem;flex-shrink:0;
  background:rgba(155,27,48,.08);border:1px solid rgba(155,27,48,.12);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;
}
.contact-info-card h4{font-size:.88rem;font-weight:600;margin-bottom:.2rem}
.contact-info-card p{font-size:.82rem;color:var(--text2)}
.contact-info-card a{font-size:.82rem;color:var(--wine-light)}
.contact-info-card a:hover{color:var(--gold)}

.contact-form-container{
  background:var(--bg2);border:1px solid rgba(155,27,48,.06);
  border-radius:var(--radius-lg);padding:2.5rem;
}
.contact-form-container h3{margin-bottom:.3rem}
.contact-form-container .form-desc{font-size:.85rem;color:var(--text3);margin-bottom:2rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}

.qr-section{display:grid;grid-template-columns:repeat(2,1fr);gap:2rem;margin-top:2rem}
.qr-card{
  background:var(--bg2);border:1px solid rgba(155,27,48,.06);
  border-radius:var(--radius);padding:2rem;text-align:center;
}
.qr-placeholder{
  width:140px;height:140px;border-radius:.6rem;
  background:var(--bg3);border:1px solid rgba(155,27,48,.08);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 1rem;font-size:2rem;
}
.qr-card h4{font-size:.88rem;margin-bottom:.3rem}
.qr-card p{font-size:.75rem;color:var(--text3)}

@media(max-width:768px){
  .contact-grid{grid-template-columns:1fr}
  .form-row{grid-template-columns:1fr}
  .qr-section{grid-template-columns:1fr}
}
</style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- Page Hero -->
<section class="page-hero">
  <div class="container">
    <span class="section-label">CONTACT</span>
    <h1>联系<span class="hl">我们</span></h1>
    <p class="page-desc">期待与您的交流，无论是产品试用、商务合作还是技术支持</p>
  </div>
</section>

<!-- Contact Content -->
<section>
  <div class="container">
    <div class="contact-grid">
      <!-- Info Cards -->
      <div>
        <h2 class="section-title fade-up" style="font-size:1.8rem;margin-bottom:2rem">联系<span class="hl">方式</span></h2>

        <div class="contact-info-cards fade-up">
          <div class="contact-info-card">
            <div class="contact-info-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
            <div>
              <h4>公司地址</h4>
              <p>广东省珠海市香洲区</p>
            </div>
          </div>
          <div class="contact-info-card">
            <div class="contact-info-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg></div>
            <div>
              <h4>商务邮箱</h4>
              <a href="mailto:info@zhsji.com">info@zhsji.com</a>
            </div>
          </div>
          <div class="contact-info-card">
            <div class="contact-info-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></div>
            <div>
              <h4>联系电话</h4>
              <a href="tel:400-888-8888">400-888-8888</a>
            </div>
          </div>
          <div class="contact-info-card">
            <div class="contact-info-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
            <div>
              <h4>微信客服</h4>
              <p>扫描下方二维码添加</p>
            </div>
          </div>
          <div class="contact-info-card">
            <div class="contact-info-icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
            <div>
              <h4>工作时间</h4>
              <p>周一至周五 9:00 - 18:00</p>
            </div>
          </div>
        </div>

        <!-- QR Codes -->
        <div class="qr-section fade-up">
          <div class="qr-card">
            <div class="qr-placeholder"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></div>
            <h4>微信客服</h4>
            <p>扫码添加客服咨询</p>
          </div>
          <div class="qr-card">
            <div class="qr-placeholder"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></div>
            <h4>微信公众号</h4>
            <p>关注获取最新资讯</p>
          </div>
        </div>
      </div>

      <!-- Contact Form -->
      <div class="contact-form-container fade-up">
        <h3>在线留言</h3>
        <p class="form-desc">填写以下信息，我们将在 24 小时内与您取得联系</p>
        <form id="contactForm" onsubmit="handleSubmit(event)">
          <div class="form-row">
            <div class="form-group">
              <label for="name">姓名 *</label>
              <input type="text" id="name" class="form-input" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
              <label for="company">公司名称</label>
              <input type="text" id="company" class="form-input" placeholder="请输入公司名称">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="email">邮箱 *</label>
              <input type="email" id="email" class="form-input" placeholder="请输入您的邮箱" required>
            </div>
            <div class="form-group">
              <label for="phone">联系电话</label>
              <input type="tel" id="phone" class="form-input" placeholder="请输入联系电话">
            </div>
          </div>
          <div class="form-group">
            <label for="subject">咨询类型</label>
            <select id="subject" class="form-input">
              <option value="">请选择咨询类型</option>
              <option value="trial">产品试用</option>
              <option value="quote">获取报价</option>
              <option value="cooperation">商务合作</option>
              <option value="support">技术支持</option>
              <option value="other">其他咨询</option>
            </select>
          </div>
          <div class="form-group">
            <label for="message">留言内容 *</label>
            <textarea id="message" class="form-input" placeholder="请描述您的需求或问题..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.85rem;font-size:.95rem">
            提交留言
          </button>
        </form>
      </div>
    </div>
  </div>
</section>

<!-- Map -->
<section class="section-alt">
  <div class="container">
    <div class="section-header-center">
      <span class="section-label fade-up">LOCATION</span>
      <h2 class="section-title fade-up" style="font-size:2rem">公司<span class="hl">位置</span></h2>
    </div>
    <div class="map-container fade-up">
      <div style="text-align:center;color:var(--text3)">
        <div style="font-size:3rem;margin-bottom:1rem"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <p style="font-size:.92rem">广东省珠海市香洲区</p>
        <p style="font-size:.78rem;margin-top:.5rem">珠海三界智能科技有限公司</p>
      </div>
    </div>
  </div>
</section>

<!-- Quick CTA -->
<section style="text-align:center;padding:5rem 0">
  <div class="container">
    <h2 class="section-title fade-up" style="font-size:2rem">更喜欢直接<span class="hl">发送邮件</span>？</h2>
    <div class="fade-up" style="margin-top:1.5rem">
      <a href="mailto:info@zhsji.com" class="btn btn-primary" style="padding:.8rem 2.5rem;font-size:1rem"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg> info@zhsji.com</a>
    </div>
  </div>
</section>

<script src="components.js"></script>
<script>
function handleSubmit(e) {
  e.preventDefault();
  var form = document.getElementById('contactForm');
  var btn = form.querySelector('button[type="submit"]');
  btn.textContent = '提交中...';
  btn.disabled = true;

  // Simulate submission
  setTimeout(function() {
    btn.textContent = '✓ 提交成功！';
    btn.style.background = 'linear-gradient(135deg, #2d7d46, #3da55d)';
    setTimeout(function() {
      btn.textContent = '提交留言';
      btn.style.background = '';
      btn.disabled = false;
      form.reset();
    }, 3000);
  }, 1200);
}
</script>
</body>
</html>
