<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联系我们 — 珠海三界智能科技有限公司</title>
<meta name="description" content="联系珠海三界智能科技有限公司，获取 PromptLogic 产品试用、商务合作及技术支持。">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<canvas id="particles"></canvas>

<section class="page-hero">
  <div class="container">
    <div class="section-label">CONTACT</div>
    <h1>联系我们</h1>
    <p class="page-desc">期待与您的交流，无论是产品试用、商务合作还是技术支持</p>
  </div>
</section>

<!-- Contact Cards -->
<section>
  <div class="container">
    <div class="contact-cards">
      <div class="contact-card fade-up">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <h4>集团总部</h4>
        <p>广东省珠海市香洲区</p>
        <p>珠海三界智能科技有限公司</p>
      </div>
      <div class="contact-card fade-up">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        <h4>商务合作</h4>
        <p>邮箱：<a href="mailto:info@zhsji.com">info@zhsji.com</a></p>
        <p>电话：<a href="tel:400-888-8888">400-888-8888</a></p>
      </div>
      <div class="contact-card fade-up">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <h4>技术支持</h4>
        <p>邮箱：<a href="mailto:support@zhsji.com">support@zhsji.com</a></p>
        <p>工作时间：周一至周五 9:00-18:00</p>
      </div>
    </div>
  </div>
</section>

<!-- Contact Form -->
<section class="section-alt">
  <div class="container">
    <div class="section-center">
      <h2 class="section-title fade-up">欢迎给我们留言</h2>
      <p class="section-desc fade-up">填写以下信息，我们将在 24 小时内与您取得联系</p>
    </div>
    <div class="contact-form-wrap fade-up">
      <form id="contactForm" onsubmit="return handleSubmit(event)">
        <div class="form-row">
          <div class="form-group">
            <label for="name">姓名 *</label>
            <input type="text" id="name" class="form-input" placeholder="请输入您的姓名" required>
          </div>
          <div class="form-group">
            <label for="company">公司名称</label>
            <input type="text" id="company" class="form-input" placeholder="请输入公司名称">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="email">邮箱 *</label>
            <input type="email" id="email" class="form-input" placeholder="请输入您的邮箱" required>
          </div>
          <div class="form-group">
            <label for="phone">联系电话</label>
            <input type="tel" id="phone" class="form-input" placeholder="请输入联系电话">
          </div>
        </div>
        <div class="form-group">
          <label for="subject">咨询类型</label>
          <select id="subject" class="form-input">
            <option value="">请选择咨询类型</option>
            <option value="trial">产品试用</option>
            <option value="quote">获取报价</option>
            <option value="cooperation">商务合作</option>
            <option value="support">技术支持</option>
            <option value="other">其他咨询</option>
          </select>
        </div>
        <div class="form-group">
          <label for="message">留言内容 *</label>
          <textarea id="message" class="form-input" placeholder="请描述您的需求或问题..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:.8rem">提交留言</button>
      </form>
    </div>
  </div>
</section>

<script>
function handleSubmit(e) {
  e.preventDefault();
  var btn = e.target.querySelector('button[type="submit"]');
  btn.textContent = '提交中...';
  btn.disabled = true;
  setTimeout(function() {
    btn.textContent = '提交成功！';
    btn.style.background = '#16a34a';
    e.target.reset();
    setTimeout(function() {
      btn.textContent = '提交留言';
      btn.style.background = '';
      btn.disabled = false;
    }, 2500);
  }, 1200);
  return false;
}
</script>
<script src="components.js"></script>
</body>
</html>
